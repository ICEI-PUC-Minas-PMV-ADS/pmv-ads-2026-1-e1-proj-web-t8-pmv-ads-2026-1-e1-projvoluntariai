<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VoluntariAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>
  <header class="topo">
    <div class="logo">VoluntariAI</div>
    <nav>
      <a href="../tela-fluxocadastro/pagina-cadastroinicial.html">Início</a>
      <a href="#">Quem Somos</a>
      <a href="#">Vagas</a>
      <a href="#" class="ativo">Login</a>
    </nav>
  </header>

  <main class="container">
    <h2>Bem-vindo de volta</h2>
    <p>Faça login para acessar sua conta e continuar pela plataforma.</p>
    <p class="info-perfil" id="info-perfil"></p>

    <form class="form-login">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="seu@email.com" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" required>

      <div class="opcoes-login">
        <label class="lembrar">
          <input type="checkbox" id="lembrar"> Lembrar-me
        </label>
        <a href="#" class="esqueci-senha" id="esqueciSenha">Esqueci minha senha</a>
      </div>

      <div class="botoes">
        <button type="submit" class="entrar">Entrar</button>
        <button type="button" class="voltar">Voltar</button>
      </div>
    </form>

    <p class="link-cadastro">Ainda não tem conta? <a
        href="../tela-fluxocadastro/pagina-cadastroinicial.html">Cadastre-se</a></p>
  </main>

  <script src="login.js"></script>
</body>

</html>
