<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar ONG - VoluntariAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pagina-cadastroOng.css">
</head>
<body>

    <header class="topo">
        <div class="logo">VoluntariAI</div>
        <nav>
            <a href="#">Sobre</a>
            <a href="#">Quem Somos</a>
            <a href="#">Vagas</a>
            <a href="#">Perfil</a>
        </nav>
    </header>

    <main class="pagina-principal">

        <div class="cabecalho-pagina">
            <h1 class="titulo-pagina">Cadastrar ONG</h1>
            <p class="subtitulo-pagina">Preencha o cadastro da ONG para divulgação de vagas.</p>
        </div>

        <div class="container-formulario">
            <form id="formCadastroOng" novalidate>

                <section class="bloco-formulario">
                    <h2 class="titulo-bloco">Informações Gerais</h2>

                    <div class="grade-campos">

                        <div class="campo-grupo">
                            <label for="nomeOrganizacao" class="campo-label">
                                Nome da Organização <span class="obrigatorio">*</span>
                            </label>
                            <input
                                type="text"
                                id="nomeOrganizacao"
                                name="nomeOrganizacao"
                                class="campo-input"
                                placeholder="Digite o nome da organização"
                                required
                            >
                            <span class="mensagem-erro" id="erro-nomeOrganizacao"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="areasAtuacao" class="campo-label">
                                Áreas de Atuações <span class="obrigatorio">*</span>
                            </label>
                            <select id="areasAtuacao" name="areasAtuacao" class="campo-input campo-select" required>
                                <option value="" disabled selected>Atuação</option>
                                <option value="educacao">Educação</option>
                                <option value="meio-ambiente">Meio Ambiente</option>
                                <option value="saude">Saúde</option>
                                <option value="assistencia-social">Assistência Social</option>
                            </select>
                            <span class="mensagem-erro" id="erro-areasAtuacao"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="email" class="campo-label">
                                E-mail <span class="obrigatorio">*</span>
                            </label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="campo-input"
                                placeholder="contato@suaong.org.br"
                                required
                            >
                            <span class="mensagem-erro" id="erro-email"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="senha" class="campo-label">
                                Senha <span class="obrigatorio">*</span>
                            </label>
                            <div class="campo-senha-wrapper">
                                <input
                                    type="password"
                                    id="senha"
                                    name="senha"
                                    class="campo-input"
                                    placeholder="••••••••"
                                    required
                                    minlength="8"
                                >
                                <button type="button" class="btn-olho" id="toggleSenha" aria-label="Mostrar senha">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <p class="campo-dica">Mínimo de 8 caracteres.</p>
                            <span class="mensagem-erro" id="erro-senha"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="confirmarSenha" class="campo-label">
                                Confirmar senha <span class="obrigatorio">*</span>
                            </label>
                            <div class="campo-senha-wrapper">
                                <input
                                    type="password"
                                    id="confirmarSenha"
                                    name="confirmarSenha"
                                    class="campo-input"
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="btn-olho" id="toggleConfirmar" aria-label="Mostrar confirmação de senha">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                            <span class="mensagem-erro" id="erro-confirmarSenha"></span>
                        </div>

                    </div>
                </section>

            </form>
        </div>

        <div class="rodape-acoes">
            <button type="button" class="btn btn-cancelar" id="btnCancelar">Cancelar</button>
            <button type="submit" form="formCadastroOng" class="btn btn-salvar">Salvar dados</button>
        </div>

    </main>

    <script src="pagina-cadastroOng.js"></script>
</body>
</html>
