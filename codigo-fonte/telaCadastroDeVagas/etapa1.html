<!DOCTYPE html>
<html lang="en">
<head>
   <title>VoluntariAI Cadastro de vagas</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="etapa1.css">
</head>
<body>
<header class = "topo">
    <div class = "logo">VoluntariAI</div>
    <nav>
      <a href="#">Sobre</a>
      <a href="#">Quem Somos </a>
      <a href="#">Vagas</a>
      <a href="#" class="ativo">Perfil</a>
    </nav>
  </header>

   <main>

    <section class="top-text">
        <h1>Cadastrar Vagas</h1>
        <p>Cadastre oportunidades de voluntariado.</p>
    </section>

    <div class="container">

        <h2>Etapa 1 - Informações Gerais</h2>

        <label>Título da vaga <span>*</span></label>
        <textarea id="vaga" placeholder="Escolha um nome para sua vaga" required></textarea>
        <small class="erro" id="erroVaga"></small>
       
        <label>Modalidade <span>*</span></label>
     <select required id="modalidade">
    <option value="" disabled selected>Selecione uma modalidade</option>
        <option value="remoto">Remoto</option>
        <option value="presencial">Presencial</option>
        <option value="hibrido">Híbrido</option>
        </select>
        <small class="erro" id="erroModalidade"></small>
        
        <label>Localização <span>*</span></label>
        <textarea id="localizacao" placeholder="Escreva a localização da sua vaga" required></textarea>
        <small class="erro" id="errolocalizacao"></small>
         <label>Número de vagas <span>*</span></label>
        <input type="number" id="ndevagas" placeholder="Informe a quantidade de Vagas" required></input>
        <small class="erro" id="errondevagas"></small>
       <div class="botoes">
        <button class="cancelar" onclick="history.back()">Cancelar</button>
     <a href="Etapa2.html" id="btnConcluído">
        Concluído
     </a>    
       </div> 
    </div>

</main>
<script src="etapa1.js"></script>
</body>
</html>
