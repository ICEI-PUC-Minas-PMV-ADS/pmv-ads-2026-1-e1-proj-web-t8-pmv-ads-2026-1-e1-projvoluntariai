<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoluntariAI - Cadastrar Vagas</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Etapa2.css">
</head>
<body>

<header class="topo">
        <div class="logo">VoluntariAI</div>
        <nav>
            <a href="#">Sobre</a>
            <a href="#">Quem somos</a>
            <a href="#" class="ativo">Vagas</a>
            <a href="#">Perfil</a>
        </nav>
</header>

<main>

    <section class="top-text">
        <h1>Cadastrar Vagas</h1>
        <p>Cadastre oportunidades de voluntariado.</p>
    </section>

    <div class="container">

        <h2>Etapa 2 - Detalhes da vaga</h2>

        <label>Descreva a vaga <span>*</span></label>
        <textarea id="vaga" placeholder="Explique o impacto da vaga" required></textarea>
        <small class="erro" id="erroVaga"></small>

        <label>Descreva as atividades <span>*</span></label>
        <textarea id="atividades" placeholder="Liste o que o voluntário fará" required></textarea>
        <small class="erro" id="erroAtividades"></small>

        <label>Descreva os requisitos <span>*</span></label>
        <textarea id="requisitos" placeholder="Liste os requisitos" required></textarea>
        <small class="erro" id="erroRequisitos"></small>
       <div class="botoes">
        <button class="cancelar" onclick="history.back()">Cancelar</button>
     <a href="etapa2C.html" id="btnConcluído">
        Concluído
     </a>
       </div>
    </div>

</main>
<script src="Etapa2.js"></script>
</body>
</html>
