<!DOCTYPE html>
<html lang="en">
<head>
   <title>VoluntariAI Cadastro de vagas</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="etapa2C.css">
</head>
<body>
<header class = "topo">
    <div class = "logo">VoluntariAI</div>
    <nav>
      <a href="#">Sobre</a>
      <a href="#">Quem Somos </a>
      <a href="#">Vagas</a>
      <a href="#" class="ativo">Perfil</a>
    </nav>
  </header>

   <main>

    <section class="top-text">
        <h1>Cadastrar Vagas</h1>
        <p>Cadastre oportunidades de voluntariado.</p>
    </section>

    <div class="container">

        <h2>Etapa 2 - Detalhes da vaga</h2>

        <label>Selecione a data de início da divulgação <span>*</span></label>
<input type="date" id="data1" min="2020-01-01" max="2050-12-31">
        <small class="erro" id="errodata1"></small>
       
       <label>Selecione a data de término da divulgação <span>*</span></label>
<input type="date" id="data2" min="2020-01-01" max="2050-12-31">
        <small class="erro" id="errodata2"></small>
        
      <label>Mencione a carga horária semanal necessária<span>*</span></label>
<input type="time" id="hora">
        <small class="erro" id="errohora"></small>
        
       <div class="botoes">
        <button class="cancelar" onclick="history.back()">Cancelar</button>  
       <a href="" id="btnConcluído">
        Concluído
     </a>    
    </div> 
    </div>

</main>
<script src="etapa2C.js"></script>
</body>
</html>
