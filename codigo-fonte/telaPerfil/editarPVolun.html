<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Editar Perfil de Usuário</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="editarVolun.css">
        <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    </head>
    <body>
       <header class = "topo">
    <div class = "logo">VoluntariAI</div>
    <nav>
      <a href="#">Sobre</a>
      <a href="#">Quem Somos </a>
      <a href="#">Vagas</a>
      <a href="#" class="ativo">Perfil</a>
    </nav>
  </header>
<div class="layout">
   <aside class="sidebar">
  <div class="perfil">
    <div class="foto">
      <i class="fa-solid fa-user"></i>
    </div>
    <p>-</p>
  </div>
<nav class="menu">
  
<div class="menu-titulo">
  <a href="#">Perfil</a>
  <i class="fa-solid fa-chevron-up"></i>
</div>

<ul>
  <li>
    <a href="#" id="ativo">Editar Perfil</a>
    </li>
    <li>
    <a href="#">Histórico de trabalho</a>
    </li>
    <li>
    <a href="#">Editar dados</a>
  </li>
</ul>
</nav>

<div class="sair">
  <a href="#">
    Sair
    <i class="fa-solid fa-right-from-bracket"></i>
  </a>
</div>
</aside>
<main> 
<div class="banner"></div>
<section class="perfilinfo">
  <div class="textousu">

    <input type="text" placeholder="Nome de usuário">

    <select>

        <option>Voluntário</option>
      <option>Voluntário PSC</option>

    </select>

</div>
    <div class="fotoperfil">
      <i class="fa-solid fa-user"></i>
      
</section>

<div class="moreInfo">
  <div class="pt1">
<label>Apresentação</label>
<textarea placeholder="Fale sobre você..."></textarea>
</div>
<div class="pt2">
  <label >Disponibilidade </label> 
<select>
  <option value="" disabled selected>Selecione sua Disponibilidade</option>
  <option>Manhã</option>
  <option>Tarde</option>
  <option>Noite</option>
</select>
</div>
<div class="pt3">
<label>Habilidades e interesses</label>
<textarea placeholder="Descreva suas Habilidades e Interesses"></textarea>
</div>

</div>



</main>

</body>
</html>
