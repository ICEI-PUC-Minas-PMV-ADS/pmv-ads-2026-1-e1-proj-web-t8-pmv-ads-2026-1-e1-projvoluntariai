<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil de ONG</title>

    <link rel="stylesheet" href="PerfilONG.css">

    <link 
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>

<body>

    <header class="topo">
        <div class="logo">VoluntariAI</div>

        <nav>
            <a href="#">Sobre</a>
            <a href="#">Quem Somos</a>
            <a href="#">Vagas</a>
            <a href="#" class="ativo">Perfil</a>
        </nav>
    </header>

    <div class="layout">

        <aside class="sidebar">

            <div class="perfil">
                <div class="foto">
                    <i class="fa-solid fa-user"></i>
                </div>

                <p>ONG-Teste</p>
            </div>

            <nav class="menu">

                <div class="menu-titulo">
                    <span>Perfil</span>
                    <i class="fa-solid fa-chevron-up"></i>
                </div>

                <ul>
                    <li>
                        <a href="#">Editar Perfil</a>
                    </li>

                    <li>
                        <a href="#">Editar Dados</a>
                    </li>

                    <li>
                        <a href="#">Gerenciar Vagas</a>
                    </li>
                </ul>

            </nav>

            <div class="sair">
                <a href="#">
                    Sair
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
            </div>

        </aside>

        <main>

            <div class="banner"></div>

            <section class="perfilinfo">

                <div class="textousu">

                    <h2>ONG-Teste</h2>

                    <p>
                        (Instituição/Localização - Dia e Horário de Funcionamento)
                    </p>

                    <div class="fotoperfil">
                        <i class="fa-solid fa-user"></i>
                    </div>

                </div>

            </section>

            <section class="bloco">
                <h3>Apresentação</h3>
                <div class="caixa"></div>
            </section>

            <section class="bloco">
                <h3>Nossos Trabalhos</h3>
                <div class="caixa2"></div>
            </section>
        <div class="filtros">
            <select id="filtroAreaAtuacao">

            <option value="">Área de Atuação</option>

            <option value="Saúde">Saúde</option>
            <option value="Animal">Animal</option>
            <option value="Educação">Educação</option>
            <option value="Meio-Ambiente">Meio-Ambiente</option>
            <option value="Esporte">Esporte</option>
            <option value="Assistencia Social">Assistencia Social</option>
            </select>
        </div> 
        </main>

    </div>

</body>
</html>
